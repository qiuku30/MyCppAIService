services:
  mysql:
    image: mysql:8.0
    container_name: ai-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ai-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.build
    container_name: ai-httpserver
    restart: always
    volumes:
      - ..:/workspace
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      KNOWLEDGE_BASE_ID: ${KNOWLEDGE_BASE_ID}
      BAIDU_CLIENT_ID: ${BAIDU_CLIENT_ID}
      BAIDU_CLIENT_SECRET: ${BAIDU_CLIENT_SECRET}
      DOUBAO_API_KEY: ${DOUBAO_API_KEY}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      LD_LIBRARY_PATH: /usr/local/lib
    ports:
      - "8116-8117:8116-8117"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: ["sh", "-c", "cd /workspace/build && cmake .. && make && ./http_server -p 8117"]

volumes:
  mysql_data:
  rabbitmq_data:
