<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>秋库AI助手</title>
<style>
    /* 全局样式 - 高级渐变背景 */
    body {
        font-family: "Microsoft YaHei", Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        color: #333;
        flex-direction: column;
    }

    h1.title {
        font-size: 38px;
        font-weight: bold;
        text-align: center;
        margin-bottom: 25px;
        background: linear-gradient(to right, #4158D0, #8A2BE2);
        /* 修复后的写法 */
        -webkit-background-clip: text; /* 兼容旧版浏览器 */
        background-clip: text; /* 标准写法，兼容性更好 */
        -webkit-text-fill-color: transparent;
        text-shadow: 0 2px 10px rgba(65,88,208,0.15);
    }

    .container {
        width: 380px;
        padding: 35px 30px;
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        box-sizing: border-box;
        text-align: center;
        transition: all 0.3s ease;
        border: 1px solid rgba(255,255,255,0.5);
    }

    .container:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 35px rgba(0,0,0,0.12);
    }

    h2 {
        font-size: 26px;
        margin-bottom: 25px;
        color: #222;
    }

    .form-group {
        margin-bottom: 22px;
        text-align: left;
    }

    .form-group label {
        display: block;
        font-size: 14px;
        color: #555;
        margin-bottom: 8px;
        font-weight: 500;
    }

    .form-group input {
        width: 100%;
        padding: 13px 15px;
        font-size: 15px;
        border: 1px solid #e0e0e0;
        border-radius: 12px;
        background: #fafafa;
        outline: none;
        transition: all 0.2s;
        box-sizing: border-box;
    }

    .form-group input:focus {
        border-color: #4158D0;
        box-shadow: 0 0 0 4px rgba(65,88,208,0.1);
        background: #fff;
    }

    .btn {
        width: 100%;
        padding: 15px;
        font-size: 16px;
        background: linear-gradient(to right, #4158D0, #8A2BE2);
        color: #fff;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s;
        margin-top: 10px;
    }

    .btn:hover {
        transform: scale(1.02);
        box-shadow: 0 6px 15px rgba(65,88,208,0.3);
    }

    .switch {
        margin-top: 20px;
        font-size: 14px;
        color: #666;
    }

    .switch a {
        color: #4158D0;
        text-decoration: none;
        cursor: pointer;
        font-weight: 500;
    }

    .switch a:hover { 
        text-decoration: underline; 
    }

    #register-container { display: none; }

    #success-alert {
        position: fixed;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: linear-gradient(to right, #4158D0, #8A2BE2);
        color: #fff;
        padding: 14px 30px;
        border-radius: 14px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.15);
        display: none;
        z-index: 1000;
        font-weight: bold;
        font-size: 15px;
    }
</style>
</head>
<body>
<div id="success-alert">提示信息</div>

<div>
    <h1 class="title">秋库AI助手</h1>

    <div class="container" id="login-container">
        <h2>登录</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="login-username">用户名</label>
                <input type="text" id="login-username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="login-password">密码</label>
                <input type="password" id="login-password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn">登录</button>
        </form>
        <div class="switch">
            没有账号？<a onclick="showRegister()">去注册账号</a>
        </div>
    </div>

    <div class="container" id="register-container">
        <h2>注册</h2>
        <form id="register-form">
            <div class="form-group">
                <label for="register-username">用户名</label>
                <input type="text" id="register-username" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label for="register-password">密码</label>
                <input type="password" id="register-password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn">注册</button>
        </form>
        <div class="switch">
            已有账号？<a onclick="showLogin()">返回登录</a>
        </div>
    </div>
</div>

<script>
function showAlert(message){
    const alertBox = document.getElementById('success-alert');
    alertBox.textContent = message;
    alertBox.style.display = 'block';
    setTimeout(()=>{alertBox.style.display='none';},1000);
}
function showRegister(){ document.getElementById('login-container').style.display='none'; document.getElementById('register-container').style.display='block'; }
function showLogin(){ document.getElementById('register-container').style.display='none'; document.getElementById('login-container').style.display='block'; }

document.getElementById('login-form').addEventListener('submit', function(e){
    e.preventDefault();
    const username=document.getElementById('login-username').value;
    const password=document.getElementById('login-password').value;

    fetch('/login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username,password})
    }).then(response=>{
        if(response.status===403){ showAlert('账号已在其他地方登录！'); throw new Error('已在其他地方登录'); }
        const contentType = response.headers.get('content-type');
        if(response.status===200){
            if(contentType && contentType.includes('application/json')) return response.json();
            else throw new Error('返回格式错误');
        }else if(response.status===401){ showAlert('账号或密码错误！'); throw new Error('认证失败'); }
        else throw new Error('请求失败');
    }).then(data=>{
        if(data && data.userId){ sessionStorage.setItem('userId', data.userId); showAlert('登录成功！'); window.location.href='/menu'; }
        else throw new Error('无效的响应数据');
    }).catch(error=>{
        console.error('Error:',error);
        if(!error.message.includes('已在其他地方登录')&&!error.message.includes('认证失败')) showAlert('操作失败，请重试');
    });
});

document.getElementById('register-form').addEventListener('submit', function(e){
    e.preventDefault();
    const username=document.getElementById('register-username').value;
    const password=document.getElementById('register-password').value;

    fetch('/register',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username,password})
    }).then(response=>{
        if(response.status===200){
            showAlert('注册成功！');
            document.getElementById('login-username').value=username;
            document.getElementById('login-password').value=password;
            setTimeout(showLogin,1000);
        }else if(response.status===409){ alert('用户名已被注册，请重新输入！'); }
    }).catch(error=>console.error('注册错误:',error));
});
</script>
</body>
</html>
