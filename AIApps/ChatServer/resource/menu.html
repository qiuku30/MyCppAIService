<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>AI 聊天菜单</title>
    <style>
        body {
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 30px;
            color: #00e1ff;
            text-shadow: 0 0 15px #00c3ff;
        }
        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 30px;
            background: #00c3ff;
            color: #fff;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-size: 1.2em;
            box-shadow: 0 0 10px #00c3ff;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #00e1ff;
            box-shadow: 0 0 20px #00e1ff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ AI 助手 ✨</h1>
        <button class="btn" onclick="goChat()">进入 AI 聊天</button>
        <button class="btn" onclick="goUpload()">进入图像识别</button>
        <button class="btn" onclick="doLogout()">退出登录</button>
    </div>

    <script>
        const userId = sessionStorage.getItem('userId');
        if (!userId) { window.location.href = '/entry'; }

        function goChat() {
            window.location.href = '/chat?userId=' + encodeURIComponent(userId);
        }
        function goUpload() {
            window.location.href = '/upload?userId=' + encodeURIComponent(userId);
        }
        async function doLogout() {
            try {
                await fetch('/user/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, type: 'manual', gameType: 0 })
                });
            } catch(e) {}
            sessionStorage.clear();
            window.location.href = '/entry';
        }
    </script>
</body>
</html>
